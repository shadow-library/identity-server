# During the @shadow-library 2.0 alpha line the auth SDK is distributed as a vendored tarball
# (consumers pin `file:vendor/shadow-library-auth-<version>.tgz`), not published to npm. This
# workflow builds and packs the tarball from the package's built dist and uploads it as an
# artifact; release-it and npm publishing were retired with the shadow CLI adoption.
name: Pack auth package tarball
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  pack:
    if: github.actor == 'leanderpaul' && github.triggering_actor == 'leanderpaul' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and pack the auth package
        working-directory: packages/auth
        run: bun run pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadow-library-auth-tarball
          path: packages/auth/*.tgz
