# Local development datastores only — the server and worker run on the host via `bun run dev`.
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shadow_identity
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    ports:
      - '6379:6379'

volumes:
  postgres-data:
